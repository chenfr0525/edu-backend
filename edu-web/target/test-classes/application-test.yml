spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false # Disable flyway for unit tests to speed up and avoid H2 compatibility issues with MySQL scripts
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-test-secret-key-test-secret-key-test-secret-key
  expiration: 3600000
